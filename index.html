<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>自动抠图切图工具</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.min.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <span class="kicker">Cutout Studio</span>
          <h1>自动抠图切图工具</h1>
          <p>本地处理图片，自动去背景，并把分离元素导出为 SVG、PNG 或 WebP。</p>
        </div>
        <div class="actions">
          <button id="sampleBtn" type="button" class="ghost">载入示例</button>
          <label class="primary">
            <input id="fileInput" type="file" accept="image/*" multiple />
            选择图片
          </label>
        </div>
      </header>

      <section id="dropZone" class="dropzone">
        <div class="drop-icon">+</div>
        <div class="drop-copy">
          <strong>拖入图片，或直接复制图片后粘贴</strong>
          <span>支持多选、批量拖入、截图粘贴；首次运行会下载模型。</span>
        </div>
        <div id="uploadFeedback" class="upload-feedback">等待图片输入</div>
      </section>

      <section class="workspace">
        <aside class="panel">
          <div class="panel-block">
            <div class="panel-title">
              <h2>图片队列</h2>
              <span id="queueCount">0 张</span>
            </div>
            <div id="queueList" class="queue-list"></div>
          </div>

          <div class="panel-block">
            <h2>处理</h2>
            <label>
              模型质量
              <select id="modelSelect">
                <option value="isnet_quint8">快速</option>
                <option value="isnet_fp16" selected>均衡</option>
                <option value="isnet">精细</option>
              </select>
            </label>
            <label>
              识别模式
              <select id="detectMode">
                <option value="auto" selected>自动</option>
                <option value="object">普通物体</option>
                <option value="illustration">插画色块</option>
              </select>
            </label>
            <label>
              透明阈值 <output id="alphaOut">16</output>
              <input id="alphaThreshold" type="range" min="1" max="160" value="16" />
            </label>
            <label>
              色块容差 <output id="colorOut">48</output>
              <input id="colorTolerance" type="range" min="12" max="120" value="48" />
            </label>
            <label>
              最小元素面积 <output id="areaOut">160</output>
              <input id="minArea" type="range" min="20" max="5000" step="20" value="160" />
            </label>
            <label>
              导出留边 <output id="padOut">8</output>
              <input id="padding" type="range" min="0" max="80" value="8" />
            </label>
            <label class="check-row">
              <input id="includeText" type="checkbox" />
              包含文字元素
            </label>
            <button id="processBtn" type="button" disabled>自动抠图并切元素</button>
            <button id="rescanBtn" type="button" class="ghost" disabled>重新识别元素</button>
          </div>

          <div class="panel-block">
            <h2>导出</h2>
            <label>
              导出格式
              <select id="formatSelect">
                <option value="png" selected>PNG</option>
                <option value="webp">WebP</option>
                <option value="svg">SVG</option>
              </select>
            </label>
            <button id="downloadCutoutBtn" type="button" class="ghost" disabled>下载整张抠图</button>
            <button id="downloadZipBtn" type="button" class="ghost" disabled>下载当前元素 ZIP</button>
            <button id="downloadBatchZipBtn" type="button" class="ghost" disabled>批量处理并下载 ZIP</button>
          </div>

          <div class="panel-block">
            <h2>手动切片</h2>
            <p class="small">在预览图上拖拽框选，可把粘连元素单独导出。</p>
            <button id="manualModeBtn" type="button" class="ghost" disabled>开启框选</button>
            <button id="exportSelectionBtn" type="button" class="ghost" disabled>导出当前框选</button>
          </div>
        </aside>

        <section class="stage">
          <div class="status" id="status">请选择一张图片。</div>
          <div class="canvases">
            <figure>
              <figcaption>原图</figcaption>
              <canvas id="sourceCanvas"></canvas>
            </figure>
            <figure class="checker">
              <figcaption>透明抠图</figcaption>
              <canvas id="resultCanvas"></canvas>
              <canvas id="overlayCanvas"></canvas>
            </figure>
          </div>
        </section>
      </section>

      <section class="elements">
        <div class="section-title">
          <h2>元素</h2>
          <span id="countLabel">0 个</span>
        </div>
        <div id="elementGrid" class="element-grid"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
